<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    {% load django_bootstrap5 %}
    {% bootstrap_css %}
    {% bootstrap_javascript %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>{% block title  %}{% endblock %}</title>
</head>
<body class="container-fluid">
    <div class="">
        <div class="col-1 fixed-top">
            <div class="d-flex flex-column bg-primary" style="width: min-content;">
                <ul class="d-flex nav nav-pills nav-flush flex-column text-center" style="height: 100vh">
                    <li class="nav-item mb-auto">
                        <a class="nav-link active py-3 border-bottom rounded-0" href="/accounts/login">
                            <i class="bi bi-person-circle" style="font-size: 4rem;" title="Profile"></i>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active py-3 border-bottom border-top rounded-0" href="{% url 'bundles_view_url' %}">
                            <i class="bi bi-house-fill" style="font-size: 4rem;" title="Main"></i>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active py-3 border-bottom rounded-0" href="{% url 'reservations_view_url' %}">
                            <i class="bi bi-basket" style="font-size: 4rem;" title="Reservations"></i>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active py-3 border-bottom rounded-0">
                            <i class="bi bi-leaf" style="font-size: 4rem;" title="Impact"></i>
                        </a>
                    </li>
                    <li class="nav-item mt-auto">
                        <a class="nav-link active py-3 border-bottom border-top rounded-0" href="{% url 'reports_view_url' %}">
                            <i class="bi bi-exclamation-circle" style="font-size: 4rem;" title="Report"></i>
                        </a>
                    </li>
                    <span class="badge text-bg-info fs-6">Streak: {{ reservation_streak }}</span>
                </ul>
            </div>
        </div>
        <div class="col py-3">
            <div class="container">
                {% block content %}
                {% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
