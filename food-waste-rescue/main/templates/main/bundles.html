{% extends 'layout.html' %}
{% block content %}

<div class="container-fluid">
    <nav class="navbar">
        <div class="container-fluid">
            <h1 class="navbar-brand">Food Waste Rescue</h1>
        </div>
    </nav>
</div>

<div class="container-fluid">
    <div class="row">
        <div class="col-3">
            <div class="card">
                <div class="card-body">

                </div>
            </div>
        </div>
        <div class="col-9">
            <div class="row">
                {% for post in posts %}
                    <div class="col-4">
                        <div class="card mb-4">
                            <div class="card-body">
                                <h2>{{post.seller.display_name}}</h2>
                                <div class="row">
                                    <div class="col">
                                        <p>Bundle {{post.id}}</p>
                                        <p>{{post.category}}</p>
                                        <p>£{{post.price}}</p>
                                    </div>
                                    <div class="col">
                                        <p>{{post.seller.location}}</p>
                                        <a href="{% url 'bundle_view_url' post.id %}" class="btn btn-outline-primary">View</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

{% endblock %}
