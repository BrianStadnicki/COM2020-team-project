{% extends "layout.html" %}

{% block content %}

{{ form.non_field_errors }}

<nav class="navbar">
    <div class="container-fluid">
        <h1 class="navbar-brand">Issue Report</h1>
    </div>
</nav>
<div class="container-fluid">

    <form method="post" action="">
        {% csrf_token %}

        <div class="input-group mb-3">
            <label class="input-group-text" for="type">Type</label>
            <select class="form-select" name="type" style="pointer-events: none;">
                <option>Choose...</option>
                <option value="C" {% if form.initial.type == 'C' %}selected="selected"{% endif %}>Collection</option>
                <option value="A" {% if form.initial.type == 'A' %}selected="selected"{% endif %}>Additional Information</option>
                <option value="S" {% if form.initial.type == 'S' %}selected="selected"{% endif %}>Seller</option>
            </select>
            {{ form.type.errors }}
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text">Report</span>
            <textarea class="form-control" aria-label="Consumer Response" name="description" {% if user.user_type == "seller" %} style="pointer-events: none;" {% endif %}>{{form.initial.description}}</textarea>
            {{ form.description.errors }}
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text">Response</span>
            <textarea class="form-control" aria-label="Seller Response" name="seller_response" {% if user.user_type != "seller" %} style="pointer-events: none;" {% endif %}>{{form.initial.seller_response}}</textarea>
            {{ form.seller_response.errors }}
        </div>

        <div class="input-group mb-3">
            <label class="input-group-text" for="status">Status</label>
            <select class="form-select" name="status" {% if user.user_type != "seller" %} style="pointer-events: none;" {% endif %}>
                <option selected>Choose...</option>
                <option value="P" {% if form.initial.status == 'P' %}selected="selected"{% endif %}>Pending</option>
                <option value="A" {% if form.initial.status == 'A' %}selected="selected"{% endif %}>Acknowledged</option>
                <option value="R" {% if form.initial.status == 'R' %}selected="selected"{% endif %}>Resolved</option>
            </select>
            {{ form.status.errors }}
        </div>

        <div class="d-flex justify-content-end">
            <input type="submit" value="Confirm" class="btn btn-primary me-auto" name="submit">
            <a href="{% url 'bundle_view_url' id=bundle_id %}" class="btn btn-outline-primary ms-auto">View bundle</a>
        </div>
    </form>
</div>
{% endblock %}
