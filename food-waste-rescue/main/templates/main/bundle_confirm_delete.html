{% extends "layout.html" %}

{% block content %}

<nav class="navbar">
        <div class="container-fluid">
            <h1 class="navbar-brand">Confirmation</h1>
        </div>
</nav>
<div class="d-flex">
    <h3>Are you sure you want to delete "{{ post.name }}"?</h3>
</div>

<div class="d-flex">
    <form method="post">
        {% csrf_token %}
        <input type="submit" value="Confirm" class="btn btn-outline-danger mt-3 me-auto">
    </form> 
    <a href="{% url 'bundle_view_url' post.id %}" class="btn btn-outline-primary mt-3 me-auto ms-1">Cancel</a>
</div>

{% endblock %}
