{% extends "layout.html" %}

{% block content %}

<nav class="navbar">
        <div class="container-fluid">
            <h1 class="navabar-brand">Change password</h1>
        </div>
</nav>

{# Show non-field errors (e.g. password mismatch) #}
{{ form.non_field_errors }}

<div class="container-fluid">
    <form method="post" action="{% url 'password_change' %}">
        {% csrf_token %}

        <div class="input-group mb-3">
            <label class="input-group-text" for="old_password">Old password</label>
            <input type="old_password" class="form-control" name="old_password">
            {{form.old_password.errors}}
        </div>

        <div class="input-group mb-3">
            <label class="input-group-text" for="new_password1">New password</label>
            <input type="new_password1" class="form-control" name="new_password1">
            {{form.new_password1.errors}}
        </div>

        <div class="input-group mb-3">
            <label class="input-group-text" for="new_password2">Confirm new password</label>
            <input type="new_password2" class="form-control" name="new_password2">
            {{form.new_password2.errors}}
        </div>

        <div class="d-flex justify-content-end">
        <input type="submit" class="me-auto btn btn-primary" value="Change Password">
        
        <input type="hidden" name="next" value="{{ next }}">
    </form>
    </div>

{% endblock %}
