<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  </head>
  <body>
    <div class="d-flex flex-column bg-primary" style="width: min-content;">
        <ul class="d-flex nav nav-pills nav-flush flex-column text-center" style="height: 100vh">
            <li class="nav-item mb-auto">
                <a class="nav-link active py-3 border-bottom rounded-0">
                    <i class="bi bi-person-circle" style="font-size: 4rem;" title="Profile"></i>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link active py-3 border-bottom border-top rounded-0">
                    <i class="bi bi-house-fill" style="font-size: 4rem;" title="Main"></i>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link active py-3 border-bottom rounded-0">
                    <i class="bi bi-basket" style="font-size: 4rem;" title="Reservations"></i>
                </a>
            </li>
                        <li class="nav-item">
                <a class="nav-link active py-3 border-bottom rounded-0">
                    <i class="bi bi-leaf" style="font-size: 4rem;" title="Impact"></i>
                </a>
            </li>
                        </li>
                        <li class="nav-item mt-auto">
                <a class="nav-link active py-3 border-bottom border-top rounded-0">
                    <i class="bi bi-exclamation-circle" style="font-size: 4rem;" title="Report"></i>
                </a>
            </li>
        </ul>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</html>
